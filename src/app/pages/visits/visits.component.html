<section class="main pb-5">
  <div class="section-heading">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <div class="d-flex">
          <i class="bi bi-arrow-left text-primary me-3 rotateRtl font-24"
            [routerLink]="[assetId ? '/page/assets/details' : '/page/home/category/'+params?.categoryId]"
            [queryParams]="assetId ? {assetId:assetId} : {name:params?.categoryName}"
            routerLinkActive="router-link-active" style="cursor: pointer;"></i>
          <h4>
            {{params?.listName}}
          </h4>
        </div>
      </div>
      <div>
        <img src="assets/img/icons/search-icon.svg" alt="search" [routerLink]="['/page/search']"
          routerLinkActive="router-link-active">
      </div>
    </div>
  </div>

  <div class="c-tabs">
    <div class="item " [class.active]="step == 1" (click)="change(1)">
      <div class="d-flex align-items-center justify-content-center ">
        <p>
          {{'Pending' | translate}}
        </p>
        <b class="badge ms-2" *ngIf="pendingItems.length">{{pendingItems.length}}</b>
      </div>
    </div>
    <div class="item " [class.active]="step == 2" (click)="change(2)">
      <div class="d-flex align-items-center justify-content-center">
        <p>
          {{'Completed' | translate}}
        </p>
      </div>
    </div>
  </div>
  <div *ngIf="step == 1" [@slideInOut1]>
    <app-pending [items]="pendingItems" [access]="access" (date)="filterPending($event)"></app-pending>
  </div>
  <div *ngIf="step == 2" [@slideInOut2]>
    <app-completed [items]="completeItems" [access]="access" (date)="filterComplete($event)"></app-completed>
  </div>




  <div *ngIf="access && access.includes(accessTypes.Create)"
    class="fixed-btn bg-highlight rounded-circle d-flex justify-content-center align-items-center shadow-lg"
    style="width: 60px; height: 60px; cursor: pointer;" (click)="openRecordRefModal()">
    <i class="bi bi-plus text-white font-30"></i>
  </div>


  <a (click)="scrollToTop()" class="
  back-to-top-icon
  rounded-xs
  back-to-top-icon-circle
  bg-highlight
  shadow-m
" style="transform: scale(1); position: fixed !important; display: flex; justify-content: center; align-items: center;">
    <i class="bi bi-arrow-up text-white font-20"></i>
  </a>
  <div *ngIf="isLoading" class="loader">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
</section>





<ng-template #executeNewRecord let-c="close" let-d="dismiss">
  <div class="modal-header text-center p-2 ">
    <h5 class="modal-title" id="deleteLabel">{{'Start_new' | translate}} {{params?.listName}}</h5>
    <button type="button" class="btn-close" (click)="d()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <div class="form-floating ">
      <input class="form-control" id="floatingInput" placeholder="{{'Name' | translate}}" [(ngModel)]="formRef"
        name="formRef">
      <label for="floatingInput"> {{'Record_reference' | translate}}</label>
    </div>
    <div class="form-floating pt-3" *ngIf="currentUser?.allowMultiCustomers">
      <ng-select [items]="customersList" bindLabel="name" class=" " appendTo="body" name="customer"
        [(ngModel)]="customerId" bindValue="id" placeholder="{{'Select Customer' | translate}}">
      </ng-select>
    </div>
    <div class="d-flex justify-content-between align-items-center">
      <button type="button" class="btn btn-primary w-100 mt-4" (click)="startExecute()"
        [disabled]="!formRef && mandatoryRecordRef">
        {{'Start' | translate}}
      </button>
    </div>
  </div>
</ng-template>
