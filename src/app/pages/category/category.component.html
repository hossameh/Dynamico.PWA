<section class="main">
  <div class="section-heading">
    <div class="d-flex">
      <i class="bi bi-arrow-left text-primary me-3 rotateRtl font-24" [routerLink]="['/page/home']"
        routerLinkActive="router-link-active" style="cursor: pointer;"></i>
      <h4>
        {{name ? name :'Category name'}}
      </h4>
    </div>
  </div>

  <div class="content px-3 py-4">
    <div class="mb-3" *ngFor="let item of items">
      <div class="white-box">
        <div class="box-content" [routerLink]="['/page/visits/'+item?.formId]" [queryParams]="{categoryName: name , listName:item.formTitle 
            , categoryId:item.categoryId}">
          <h5 class="font-14">
            {{item?.formTitle}}
          </h5>
        </div>



        <div *ngIf="item?.access && item.access.includes(accessTypes.Create)" class="box-side"
          (click)="openRecordRefModal(item)">
          <div class="d-flex align-items-center">
            <p class="badge me-2" *ngIf="item?.totalRecords">{{item?.totalRecords}}</p>
            <i class="bi bi-plus-circle-fill text-primary font-30"></i>

          </div>
        </div>





      </div>
    </div>
  </div>

  <a (click)="scrollToTop()" class="
  back-to-top-icon
  rounded-xs
  back-to-top-icon-circle
  bg-highlight
  shadow-m
" style="transform: scale(1); position: fixed !important; display: flex; justify-content: center; align-items: center;">
    <i class="bi bi-arrow-up text-white font-20"></i>
  </a>
  <div *ngIf="isLoading" class="loader">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

</section>



<ng-template #newRecord let-c="close" let-d="dismiss">
  <div class="modal-header text-center p-2 ">
    <h5 class="modal-title" id="deleteLabel">{{'Start_new' | translate}} {{selectedItem?.formTitle}}</h5>
    <button type="button" class="btn-close" (click)="d()" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <div class="form-floating ">
      <input class="form-control" id="floatingInput" placeholder="{{'Name' | translate}}" [(ngModel)]="formRef"
        name="formRef">
      <label for="floatingInput"> {{'Record_reference' | translate}}</label>
    </div>
    <div class="form-floating pt-3" *ngIf="currentUser?.allowMultiCustomers">
      <ng-select [items]="customersList" bindLabel="name" class=" " appendTo="body" name="customer"
        [(ngModel)]="customerId" bindValue="id" placeholder="{{'Select Customer' | translate}}">
      </ng-select>
    </div>
    <div class="d-flex justify-content-between align-items-center">
      <button type="button" class="btn btn-primary w-100 mt-4" data-bs-dismiss="modal" (click)="startExecute()"
        routerLinkActive="router-link-active" [disabled]="!formRef && mandatoryRecordRef">
        {{'Start' | translate}}
      </button>
    </div>
  </div>
</ng-template>
